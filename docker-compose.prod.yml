services:
  client:
    build: ./client
    image: law-college-website-client:latest
    container_name: ssnlc-client
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://ssnlc.in/api
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ssnlc_network

  server:
    build: ./server
    image: law-college-website-server:latest
    container_name: ssnlc-server
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=5000
      - FRONTEND_URI=https://ssnlc.in
      - MONGO_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - ssnlc_network

  mongodb:
    image: mongo:7
    container_name: ssnlc-mongodb
    restart: always
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - ssnlc_network

  nginx:
    build: ./nginx
    image: law-college-website-nginx:latest
    container_name: ssnlc-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt/live/ssnlc.in/fullchain.pem:/etc/nginx/ssl/cert.pem:ro
      - /etc/letsencrypt/live/ssnlc.in/privkey.pem:/etc/nginx/ssl/key.pem:ro
    depends_on:
      client:
        condition: service_healthy
      server:
        condition: service_healthy
    networks:
      - ssnlc_network

networks:
  ssnlc_network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local