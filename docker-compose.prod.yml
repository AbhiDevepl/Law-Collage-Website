services:
  client:
    build:
      context: ./client
      args:
        - NEXT_PUBLIC_API_URL=https://ssnlc.in/api
    restart: always
    environment:
      - NODE_ENV=production
    labels:
      # --- Traefik Routing ---
      - "traefik.enable=true"
      - "traefik.http.routers.ssnlc.rule=Host(`ssnlc.in`)"
      - "traefik.http.routers.ssnlc.entrypoints=websecure"
      - "traefik.http.routers.ssnlc.tls=true"
      - "traefik.http.routers.ssnlc.tls.certresolver=letsencrypt"
      - "traefik.http.services.ssnlc.loadbalancer.server.port=3000"
      # --- www redirect ---
      - "traefik.http.routers.ssnlc-www.rule=Host(`www.ssnlc.in`)"
      - "traefik.http.routers.ssnlc-www.entrypoints=websecure"
      - "traefik.http.routers.ssnlc-www.tls=true"
      - "traefik.http.routers.ssnlc-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.ssnlc-www.middlewares=ssnlc-www-redirect"
      - "traefik.http.middlewares.ssnlc-www-redirect.redirectregex.regex=^https://www\\.ssnlc\\.in/(.*)"
      - "traefik.http.middlewares.ssnlc-www-redirect.redirectregex.replacement=https://ssnlc.in/$${1}"
      - "traefik.http.middlewares.ssnlc-www-redirect.redirectregex.permanent=true"
      # --- Security Headers Middleware ---
      - "traefik.http.routers.ssnlc.middlewares=ssnlc-headers,ssnlc-compress"
      - "traefik.http.middlewares.ssnlc-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.ssnlc-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.ssnlc-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.ssnlc-headers.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.ssnlc-headers.headers.frameDeny=false"
      - "traefik.http.middlewares.ssnlc-headers.headers.customFrameOptionsValue=SAMEORIGIN"
      - "traefik.http.middlewares.ssnlc-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.ssnlc-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.ssnlc-headers.headers.permissionsPolicy=camera=(), microphone=(), geolocation=(), interest-cohort=()"
      - "traefik.http.middlewares.ssnlc-headers.headers.contentSecurityPolicy=default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://ssnlc.in; frame-ancestors 'self'; form-action 'self'; base-uri 'self'"
      # --- Gzip Compression ---
      - "traefik.http.middlewares.ssnlc-compress.compress=true"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - dokploy-network

  server:
    build: ./server
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=5000
      - FRONTEND_URI=https://ssnlc.in
      - MONGO_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
