version: '3.8'

services:
  # NGINX Reverse Proxy with SSL/TLS
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ssnlc-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # Mount Let's Encrypt certificates directly (alternative method)
      # - /etc/letsencrypt/live/ssnlc.in:/etc/nginx/ssl:ro
    environment:
      - DOMAIN=ssnlc.in
      - ENVIRONMENT=production
    depends_on:
      client:
        condition: service_healthy
      server:
        condition: service_healthy
    restart: always
    networks:
      - ssnlc_network
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 512m
    cpus: 1

  # Next.js Frontend
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: ssnlc-client
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://ssnlc.in/api}
      - FRONTEND_URI=${FRONTEND_URI:-https://ssnlc.in}
    expose:
      - "3000"
    depends_on:
      - server
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 1024m
    cpus: 1.5
    networks:
      - ssnlc_network

  # Express.js Backend
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ssnlc-server
    environment:
      - NODE_ENV=production
      - PORT=5000
      - FRONTEND_URI=${FRONTEND_URI:-https://ssnlc.in}
      - MONGO_URI=mongodb://mongodb:27017/ssnlc
      - JWT_SECRET=${JWT_SECRET:-change_this_to_secure_secret}
      - ENVIRONMENT=production
    expose:
      - "5000"
    depends_on:
      mongodb:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 768m
    cpus: 1.5
    networks:
      - ssnlc_network

  # MongoDB Database
  mongodb:
    image: mongo:6
    container_name: ssnlc-mongodb
    environment:
      - MONGO_INITDB_DATABASE=ssnlc
    restart: always
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 512m
    cpus: 1
    volumes:
      - mongodb_data:/data/db
    networks:
      - ssnlc_network
    # Don't expose MongoDB port outside the network
    expose:
      - "27017"

networks:
  ssnlc_network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/mongodb_volume
