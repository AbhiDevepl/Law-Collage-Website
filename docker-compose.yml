version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: ssnlc-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - client
      - server
    restart: always
    networks:
      - ssnlc_network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: ssnlc-client
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost/api}
    expose:
      - "3000"
    depends_on:
      - server
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ssnlc_network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ssnlc-server
    environment:
      - NODE_ENV=production
      - PORT=5000
      - FRONTEND_URI=${FRONTEND_URI:-http://localhost}
      - MONGO_URI=${MONGO_URI:-mongodb://mongodb:27017/ssnlc}
      - JWT_SECRET=${JWT_SECRET:-your_secure_jwt_secret}
    expose:
      - "5000"
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ssnlc_network

  mongodb:
    image: mongo:6
    container_name: ssnlc-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=ssnlc
    volumes:
      - mongodb_data:/data/db
    restart: always
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - ssnlc_network

networks:
  ssnlc_network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
