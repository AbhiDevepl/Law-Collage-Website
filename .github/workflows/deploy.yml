# Deploy to Production
#
# NOTE: If using Coolify's native GitHub integration, this workflow
# can be simplified or removed. Coolify can detect pushes and deploy
# automatically via its webhook. This SSH-based deploy is kept as a
# fallback for manual deployments.

name: Deploy to Production

on:
  push:
    branches:
      - main


jobs:
  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Build Next.js
        run: npm run build
        working-directory: client

  deploy:
    name: Deploy to VPS
    needs: lint-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /home/devx/Law-Collage-Website
            bash scripts/deploy.sh
